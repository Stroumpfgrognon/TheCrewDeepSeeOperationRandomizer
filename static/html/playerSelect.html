<div
  class="popup-center"
  style="height:100%;"
>
  <div class="select-player">
    <button @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(1)"  @click="app.setPlayer(1); app.popup.done()" class="P1">P1</button>
    <button @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(2)"  @click="app.setPlayer(2); app.popup.done()" class="P2">P2</button>
    <button @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(3)"  @click="app.setPlayer(3); app.popup.done()" class="P3">P3</button>
    <template x-if="app.current_players>=4">
      <button @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(4)"  @click="app.setPlayer(4); app.popup.done()" class="P4">P4</button>
    </template>
    <template x-if="app.current_players>=5">
      <button @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(5)"  @click="app.setPlayer(5); app.popup.done()" class="P5">P5</button>
    </template>
  </div>
</div>
