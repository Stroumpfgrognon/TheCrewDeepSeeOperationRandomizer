<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/static/images/icon.ico" />
    <title>The Crew Deep Sea Operation Randomizer</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/popup.css" />
    <script type="module" src="/static/js/app.js" defer></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body
    x-data="{app: new App()}"
    @mousemove="app.handleMouseMove($event)"
    @mouseup="app.handleMouseUp()"
    @keyup.escape="app.popup.done(); app.selected_mission_id=null"
  >
    <h1 class="title">THE CREW : Mission Deep Sea - Operation randomizer</h1>
    <!-- <h2 class="subtitle">Operation Randomizer</h2> -->
    <div class="main-container">
      <div
        id="popup_area"
        class="blocking hidden"
        :class="{'hidden': app.popup.hidden}"
      >
        <div
          id="popup"
          @click.outside="app.popup.done(); app.selected_mission_id=null"
        >
          <div
            class="popuptop"
            @mousedown="app.popup.setMoving($event)"
            :class="{'grabbed': app.popup.moving}"
          >
            <h3 id="popup_title">Popup</h3>
            <button
              id="popup_exit"
              @click="app.popup.done(event); app.selected_mission_id=null"
            >
              X
            </button>
          </div>
          <div id="popup_body" class="popup_rounded">
            <div
              class="popup-center popup-view"
              style="height: 100%"
              :style="`background-color : var(--ui-P${app.popup.behaviour.hovered_player}-light)`"
            >
              <div class="select-player">
                <button
                  @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(1)"
                  @click="app.setPlayer(1); app.popup.done()"
                  class="P1"
                >
                  P1
                </button>
                <button
                  @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(2)"
                  @click="app.setPlayer(2); app.popup.done()"
                  class="P2"
                >
                  P2
                </button>
                <button
                  @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(3)"
                  @click="app.setPlayer(3); app.popup.done()"
                  class="P3"
                >
                  P3
                </button>
                <template x-if="app.current_players>=4">
                  <button
                    @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(4)"
                    @click="app.setPlayer(4); app.popup.done()"
                    class="P4"
                  >
                    P4
                  </button>
                </template>
                <template x-if="app.current_players>=5">
                  <button
                    @mouseover.prevent="app.popup.behaviour.setHoveredPlayer(5)"
                    @click="app.setPlayer(5); app.popup.done()"
                    class="P5"
                  >
                    P5
                  </button>
                </template>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="container">
        <div class="parameters">
          <div class="custom-select">
            <select x-model="app.players">
              <option value="3">3 Players</option>
              <option value="4">4 Players</option>
              <option value="5">5 Players</option>
            </select>
          </div>
          <div class="difficulty">
            <a>Difficulty</a>
            <input
              type="number"
              x-model="app.difficulty"
              @input="app.updateDifficulty($event.target.value)"
              min="1"
              max="100"
            />
          </div>
          <div class="difficulty">
            <a>Classic/54 Cards</a>
            <div class="bauble_box">
              <input
                class="bauble_input"
                id="input_mode"
                name="bauble"
                type="checkbox"
                style="display: none"
                ;
                @change="app.converted = !app.converted"
                x-bind:checked="app.converted"
              />
              <label class="bauble_label" for="input_mode">Toggle</label>
            </div>
          </div>
          <div>
            <button class="operation-start" @click="app.generateMissions()">
              Start operation !
            </button>
          </div>
          <a style="flex: 0 0 100%"
            >Captain is player with Black 2 / Submarine 2 / Joker</a
          >
        </div>
        <!-- <template
          x-if="app.missions.find(m => !m.completed) === undefined && app.missions.length > 0"
        > -->
        <h1
          class="victory hidden-light"
          :class="{'hidden-light' : !(app.missions.find(m => !m.completed) === undefined && app.missions.length > 0)}"
        >
          Victory !! Ready to start a new operation ?
        </h1>
        <!-- </template> -->
        <div class="player-missions-lists-container">
          <template x-for="i in parseInt(app.current_players)">
            <div
              :id="'P'+i+'-missions'"
              class="player-missions-lists"
              :class="`P${i}-light`"
            >
              <a
                class="mission-player-name"
                x-text="`${app.playerNames[i]}`"
              ></a>
              <div class="missions">
                <template x-for="mission in app.missions" :key="mission.id">
                  <template x-if="mission.player==i">
                    <div
                      :id="'miss-' + mission.id"
                      class="mission-card"
                      @dblclick="app.selectMission(mission.id); app.popup.show($event,'selection')"
                      :class="{'opacity_sway' : mission.id===app.selected_mission_id && !app.is_moving_mission, 'mission-completed': mission.completed, 'grabbed': app.is_moving_mission && mission.id===app.selected_mission_id}"
                      :style="`background-color : var(--ui-P${app.missions.find(m => m.id===mission.id).player}-light);`"
                      @mousedown="app.selectMission(mission.id); app.is_moving_mission = true; app.missions.find(m => m.id===mission.id).setMoving($event)"
                      @click="app.flipMission(mission.id)"
                    >
                      <a
                        x-text="mission.difficulty"
                        class="mission-difficulty"
                      ></a>
                      <template
                        x-if="app.missions.find(m => m.id===mission.id).player!=null"
                      >
                        <a
                          class="mission-player-name"
                          x-text="`P${app.missions.find(m => m.id===mission.id).player}`"
                        ></a>
                      </template>
                      <a
                        x-text="mission.description"
                        class="mission-description"
                      ></a>
                    </div>
                  </template>
                </template>
              </div>
            </div>
          </template>
        </div>
        <div class="missions">
          <template x-for="mission in app.missions" :key="mission.id">
            <template x-if="mission.player==null">
              <div
                :id="'miss-' + mission.id"
                class="mission-card"
                @dblclick="app.selectMission(mission.id); app.popup.show($event,'selection')"
                :class="{'opacity_sway' : !app.is_moving_mission && mission.id===app.selected_mission_id, 'grabbed': app.is_moving_mission && mission.id===app.selected_mission_id}"
                @mousedown="app.selectMission(mission.id); app.is_moving_mission = true; app.missions.find(m => m.id===mission.id).setMoving($event)"
              >
                <a x-text="mission.difficulty" class="mission-difficulty"></a>
                <template
                  x-if="app.missions.find(m => m.id===mission.id).player!=null"
                >
                  <a
                    class="mission-player-name"
                    x-text="`P${app.missions.find(m => m.id===mission.id).player}`"
                  ></a>
                </template>
                <a x-text="mission.description" class="mission-description"></a>
              </div>
            </template>
          </template>
        </div>
      </div>
    </div>
  </body>
</html>
