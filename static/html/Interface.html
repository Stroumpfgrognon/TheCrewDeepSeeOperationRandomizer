<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Crew Mission Generator</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/popup.css" />
    <script type="module" src="/static/js/app.js" defer></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body
    x-data="{app: new App()}"
    @mousemove="app.handleMouseMove($event)"
    @mouseup.prevent="app.handleMouseUp()"
  >
    <div id="popup_area" hidden="true" class="blocking">
      <div id="popup" @click.outside="app.popup.done()">
        <div class="popuptop" @mousedown="app.popup.setMoving($event)">
          <h3 id="popup_title">Popup</h3>
          <button id="popup_exit" @click="app.popup.done(event)">X</button>
        </div>
        <div
          id="popup_body"
          :style="`background-color : var(--ui-P${app.popup.behaviour.hovered_player}-light)`"
        ></div>
      </div>
    </div>
    <div class="container">
      <h1>THE CREW : Mission Deep Sea mission generator</h1>
      <select x-model="app.players">
        <option value="3">3 Players</option>
        <option value="4">4 Players</option>
        <option value="5">5 Players</option>
      </select>

      <a>Difficulty (1-100): </a>
      <input
        type="number"
        x-model="app.difficulty"
        @input="app.updateDifficulty($event.target.value)"
        min="1"
        max="100"
      />

      <input type="checkbox" x-model="app.converted" value="true" /> Converted
      types

      <div>
        <button @click="app.generateMissions()">Generate Missions</button>
      </div>
      <div class="player-missions-container">
        <template x-for="i in parseInt(app.current_players)">
          <div
            :id="'P'+i+'-missions'"
            class="player-missions"
            :class="`P${i}-light`"
          >
            <a class="mission-player" x-text="`P${i}`"></a>
            <div class="missions">
              <template x-for="mission in app.missions" :key="mission.id">
                <template x-if="mission.player==i">
                  <div
                    :id="'miss-' + mission.id"
                    class="mission-card"
                    @dblclick="app.selectMission(mission.id); app.popup.show($event,'selection')"
                    :class="`P${app.missions.find(m => m.id===mission.id).player}-light`"
                    @mousedown="app.selectMission(mission.id); app.is_moving_mission = true; app.missions.find(m => m.id===mission.id).setMoving($event)"
                  >
                    <a
                      x-text="mission.difficulty"
                      class="mission-difficulty"
                    ></a>
                    <template
                      x-if="app.missions.find(m => m.id===mission.id).player!=null"
                    >
                      <a
                        class="mission-player"
                        x-text="`P${app.missions.find(m => m.id===mission.id).player}`"
                      ></a>
                    </template>
                    <a
                      x-text="mission.description"
                      class="mission-description"
                    ></a>
                  </div>
                </template>
              </template>
            </div>
          </div>
        </template>
      </div>
      <div class="missions">
        <template x-for="mission in app.missions" :key="mission.id">
          <template x-if="mission.player==null">
            <div
              :id="'miss-' + mission.id"
              class="mission-card"
              @dblclick="app.selectMission(mission.id); app.popup.show($event,'selection')"
              :class="`P${app.missions.find(m => m.id===mission.id).player}-light`"
              @mousedown="app.selectMission(mission.id); app.is_moving_mission = true; app.missions.find(m => m.id===mission.id).setMoving($event)"
            >
              <a x-text="mission.difficulty" class="mission-difficulty"></a>
              <template
                x-if="app.missions.find(m => m.id===mission.id).player!=null"
              >
                <a
                  class="mission-player"
                  x-text="`P${app.missions.find(m => m.id===mission.id).player}`"
                ></a>
              </template>
              <a x-text="mission.description" class="mission-description"></a>
            </div>
          </template>
        </template>
      </div>
    </div>
  </body>
</html>
